name: Build Static Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Checkout onmyoji-flow dependency
        run: git clone --depth 1 https://github.com/FiresChain/onmyoji-flow.git ../onmyoji-flow

      - name: Install dependencies
        run: npm ci

      - name: Generate static site
        run: npm run generate

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: onmyoji-wiki-static
          path: ./.output/public
